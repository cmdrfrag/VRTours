<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venue 2 VR Tour</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <link rel="stylesheet" href="../../css/styles.css" />
</head>
<body class="experience-page" data-scenes-config="scenes.json">
  <a class="back-link" href="../../index.html">← All experiences</a>

  <video id="video360"
         crossorigin="anonymous"
         loop
         playsinline webkit-playsinline
         preload="auto"
         style="display:none;"></video>

  <div id="minimap"></div>

  <button id="startButton" type="button">Enter Experience</button>

  <div id="onboardingOverlay" aria-live="polite">
    <div class="message-card">
      <strong>Welcome to the VR tour</strong>
      <p>Look around, focus on glowing spheres to move.</p>
      <button id="dismissOnboarding" type="button">Got it</button>
    </div>
  </div>

  <div id="idleHint" aria-live="polite">Look around or focus on a glowing sphere to move.</div>
  <div id="hotspotTooltip" aria-live="polite">Look here to move</div>

  <div id="fadeOverlay"></div>

  <div id="loadingOverlay">Loading…</div>

  <a-scene vr-mode-ui="enabled: true">
    <a-entity id="videosphere-container"></a-entity>

    <a-entity id="playerCamera" camera look-controls position="0 1.6 0">
      <a-entity id="cursor" position="0 0 -1"
                cursor="fuse: true; fuseTimeout: 2000">
        <a-entity
          geometry="primitive: ring; radiusInner: 0.018; radiusOuter: 0.025"
          material="color: white; shader: flat">
        </a-entity>

        <a-entity id="cursor-progress"
          geometry="primitive: ring; radiusInner: 0.018; radiusOuter: 0.025"
          material="color: yellow; shader: flat; opacity: 0.7"
          scale="0 1 1">
        </a-entity>
      </a-entity>
    </a-entity>

    <a-entity id="toScene2"
      geometry="primitive: sphere; radius: 0.3"
      material="color: green; opacity: 0.5; transparent: true"
      position="0 1 -3"
      visible="false"></a-entity>

    <a-entity id="toScene3"
      geometry="primitive: sphere; radius: 0.3"
      material="color: blue; opacity: 0.5; transparent: true"
      position="1 1 -3"
      visible="false"></a-entity>
  </a-scene>

  <script src="../../js/hotspots.js"></script>
  <script src="../../js/sceneManager.js"></script>
  <script src="../../js/app.js"></script>
</body>
</html>
